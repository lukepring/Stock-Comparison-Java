# ================================
# Alpha Vantage API Configuration
# ================================
# Get your free key at: https://www.alphavantage.co/support/#api-key
# Use 'demo' for quick testing (limited symbols, 25 calls/day)
alphavantage.key=${ALPHAVANTAGE_KEY:demo}
# "full" is now treated as premium for TIME_SERIES_DAILY by Alpha Vantage (free keys will get an "Information" response).
alphavantage.outputsize=compact

# ================================
# Development / Debugging Helpers
# ================================
# Disable Thymeleaf template caching → changes to index.html reload instantly without restart
spring.thymeleaf.cache=false

# Show detailed startup logs and bean wiring info (helpful for debugging ambiguous mappings, etc.)
logging.level.org.springframework=INFO
# logging.level.org.springframework.web=DEBUG          ← uncomment for more request details
# logging.level.com.sharecomparison=DEBUG              ← uncomment to log your own classes

# Optional: Change server port if 8080 is blocked/conflicted
# server.port=8081

# Optional: If you later add a database (e.g. H2 for persistent cache)
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
